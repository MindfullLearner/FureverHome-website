<script>
    fetch("api/check_auth.php")
        .then(res => res.text())
        .then(res => {
            if(res == "unauthorized"){
                window.location = "login.html";
            } else {
                document.body.style.display = "block";
            }
        });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurEver Home - Notifications</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo">🐾 FurEver <span>Home</span></a>
        <ul class="nav-links">
            <li><a href="user-dashboard.html">Dashboard</a></li>
            <li><a href="browse-pets.html">Browse Pets</a></li>
            <li><a href="#" onclick="logout()" class="btn btn-secondary btn-small">Logout</a></li>
        </ul>
    </nav>

    <!-- Page Banner -->
    <div class="page-banner">
        <h1>🔔 Notifications</h1>
        <p>Stay updated on your adoption applications and new pet arrivals</p>
    </div>

    <div class="notif-wrapper">

        <!-- Header row -->
        <div class="notif-header">
            <p id="unread-count" style="font-size:0.88rem; color:var(--text-light);">
                Loading...
            </p>
            <button class="btn btn-secondary btn-small" onclick="markAllRead()">
                Mark All as Read
            </button>
        </div>

        <!-- Dynamic notifications loaded here -->
        <div id="notif-list">
            <p style="text-align:center; padding:30px;">Loading notifications... ⏳</p>
        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>🐾 FurEver Home &copy; 2025 | Made with love for every furry soul 💕</p>
    </footer>

<script>
    // =====================
    // LOGOUT
    // =====================
    function logout(){
        fetch("api/logout.php")
        .then(res => res.text())
        .then(() => { window.location = "login.html"; });
    }

    // =====================
    // LOAD NOTIFICATIONS
    // =====================
    function loadNotifications() {
        fetch('api/get_notifications.php')
        .then(res => res.json())
        .then(data => {
            const list        = document.getElementById('notif-list');
            const unreadLabel = document.getElementById('unread-count');

            if (data.status !== 'success') {
                list.innerHTML = `<p style="text-align:center; padding:30px; color:red;">Failed to load notifications.</p>`;
                return;
            }

            // Update unread count
            unreadLabel.innerHTML = `You have <strong style="color:var(--pink-dark);">${data.unread_count} unread</strong> notifications`;

            // No notifications
            if (data.notifications.length === 0) {
                list.innerHTML = `<p style="text-align:center; padding:30px;">No notifications yet 🐾</p>`;
                return;
            }

            // Emoji per type
            const typeEmoji = {
                success : '✅',
                info    : '🐾',
                warning : '📝',
                error   : '❌'
            };

            // Separate new and earlier
            let newHTML      = '';
            let earlierHTML  = '';
            let hasNew       = false;
            let hasEarlier   = false;

            const now     = new Date();
            const today   = now.toDateString();
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);

            data.notifications.forEach(n => {
                const notifDate   = new Date(n.created_at);
                const isToday     = notifDate.toDateString() === today;
                const isYesterday = notifDate.toDateString() === yesterday.toDateString();

                // Format time
                let timeLabel = '';
                if (isToday) {
                    timeLabel = 'Today · ' + notifDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                } else if (isYesterday) {
                    timeLabel = 'Yesterday · ' + notifDate.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                } else {
                    timeLabel = notifDate.toLocaleDateString([], {day:'numeric', month:'short', year:'numeric'});
                }

                const unreadClass = n.is_read == 0 ? 'unread' : '';
                const dot         = n.is_read == 0 ? '<div class="unread-dot"></div>' : '';
                const emoji       = typeEmoji[n.type] || '🔔';

                const card = `
                    <div class="notif-card ${unreadClass} type-${n.type}">
                        <div class="notif-emoji">${emoji}</div>
                        <div class="notif-body">
                            <h4>${n.title}</h4>
                            <p>${n.message}</p>
                            <div class="notif-time">${timeLabel}</div>
                        </div>
                        ${dot}
                    </div>
                `;

                // Today & yesterday = New, older = Earlier
                if (isToday || isYesterday) {
                    newHTML += card;
                    hasNew   = true;
                } else {
                    earlierHTML += card;
                    hasEarlier   = true;
                }
            });

            // Build final HTML
            let finalHTML = '';

            if (hasNew) {
                finalHTML += `<div class="notif-section-label">New</div>` + newHTML;
            }

            if (hasEarlier) {
                finalHTML += `<div class="notif-section-label">Earlier</div>` + earlierHTML;
            }

            list.innerHTML = finalHTML;
        })
        .catch(err => {
            document.getElementById('notif-list').innerHTML =
                `<p style="text-align:center; padding:30px; color:red;">Something went wrong.</p>`;
            console.error(err);
        });
    }

    // =====================
    // MARK ALL AS READ
    // =====================
    function markAllRead() {
        fetch('api/mark_read.php', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                loadNotifications(); // refresh list
            }
        })
        .catch(err => console.error(err));
    }

    // =====================
    // INIT
    // =====================
    document.addEventListener('DOMContentLoaded', function() {
        loadNotifications();
    });
</script>
</body>
</html>
